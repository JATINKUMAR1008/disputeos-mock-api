services:
  mock-api:
    build: .
    container_name: disputeos-mock-api
    ports:
      - "8888:8888"
    # Bind-mount the whole project for live reload. Avoids the maintenance
    # burden of listing each .py file individually (which previously caused
    # models.py / store.py to be missed when v2.0 landed).
    volumes:
      - ./:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8888 --reload
    restart: unless-stopped
