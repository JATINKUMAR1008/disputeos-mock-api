# Alembic config for disputeos-mock-api.
#
# The actual database URL is NOT hard-coded here — `alembic/env.py` reads
# `DIRECT_DATABASE_URL` (preferred) or `DATABASE_URL` from the environment
# at runtime. DDL runs against the direct Postgres connection, not the
# Supavisor pooler, because some DDL statements misbehave under
# transaction-mode pooling.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Leave blank — resolved in env.py from env vars.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
